name: Deploy UAT to Azure App Service

on:
  push:
    branches:
      - uat
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: uat
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify UAT frontend configuration
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: letterhead-app-uat-dist
          path: dist
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: uat
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: letterhead-app-uat-dist
          path: dist

      - name: Deploy to UAT App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: letterhead-app-uat
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./dist
          clean: true
          restart: true
